<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Clicker Game</title>
		<link rel="icon" type="image/png" href="assets/images/cookie.png">
		<link rel="stylesheet" href="style.css">
	</head>

	<body>
		<div class="layout">
			<div class="screen-half">
				<h1>Cookie Clicker</h1>

				<h2 id="cookie-display">0 cookies</h2>
				<h3 id="cps-display">per second: 0</h3>
				<img src="assets/images/cookie.png" class="clickable-cookie" onclick="processCookieClick()">

				<button onclick="resetGame()">Reset Game</button>
			</div>

			<div class="screen-half">
				<p>Upgrades</p>
				<div id="upgrade-shop"></div>

				<p>Buildings</p>
				<div id="building-shop"></div>
			</div>
		</div>

		<script src="game.js" defer></script>
		<script src="upgrades.js" defer></script>
		<script src="buildings.js" defer></script>
		<script src="save.js" defer></script>
		<script src="ui.js" defer></script>
		<script src="main.js" defer></script>
	</body>
</html>
